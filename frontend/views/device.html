<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>XR Vision (Web Device)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />


    <!-- Device-only PWA -->
    <link rel="manifest" href="/device.webmanifest">
    <link rel="icon" href="/public/images/xr-logo-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/public/images/xr-logo-192.png" />
    <!-- Styles -->
    <link rel="stylesheet" href="/public/css/common.css" />
    <link rel="stylesheet" href="/public/css/device.css" />
</head>

<body>
    <div class="container">
        <!-- XR VISION Logo -->
        <div class="xr-vision-logo">
            <svg width="60" height="40" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 10 L20 30 L15 20 L10 10 M30 10 L40 30" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M25 20 L35 20 M28 25 L32 25" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">XR VISION</span>
        </div>

        <!-- Connection Status at Top -->
        <div id="connectionStatus" class="connection-status">
            <div class="status-indicator"></div>
            <span id="statusText">Disconnected</span>
        </div>

        <!-- Hidden XR Device ID input (auto-filled) -->
        <input id="deviceXrIdInput" type="hidden" />

        <!-- Hidden legacy buttons (kept for functionality, not displayed) -->
        <div style="display: none;">
            <button id="btnConnect">Connect</button>
            <button id="btnStream">Start Stream</button>
            <button id="btnMute">Mute</button>
            <button id="btnVideo">Hide Video</button>
            <button id="btnVoice">Start Voice</button>
            <button id="btnAudio" disabled>Audio</button>
            <button id="btnStartRec">Start Recording</button>
            <button id="btnStopRec">Stop Recording</button>
        </div>

        <!-- Hidden legacy elements -->
        <div style="display: none;">
            <div id="chipLastCmd" class="chip" hidden>Heard: …</div>
            <video id="preview" autoplay playsinline webkit-playsinline muted></video>
            <div id="noStream" class="preview-empty" hidden>Stream not ready</div>
            <div id="msgList" class="msg-list"></div>
            <input id="msgInput" class="input" placeholder="Type a message…" />
            <input id="chkUrgent" type="checkbox" />
            <button id="btnSend" class="btn-send">Send</button>
        </div>

        <!-- Main Sphere Visualization -->
        <div class="sphere-container">
            <div class="sphere">
                <div class="wave-container">
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                </div>
                <div class="sphere-inner"></div>
            </div>
        </div>

        <!-- Transcript Display - Response Box -->
        <div id="transcriptDisplay" class="transcript-display" hidden>
            <div class="play-icon-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M8 5v14l11-7z" fill="currentColor"/>
                </svg>
            </div>
            <p id="transcriptText">Your XR assistant response appears here...</p>
        </div>

        <!-- Hold to Speak Button -->
        <button id="btnHoldToSpeak" class="hold-to-speak-btn">
            <div class="mic-icon-wrapper">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M12 19v4M8 23h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="btn-text">Hold to Speak</span>
        </button>
    </div>

    <!-- Socket.IO client -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- XR config (must load before app modules) -->
    <script src="/public/js/config.js"></script>
    <!-- App logic -->
    <script type="module" src="/public/js/ui.js"></script>


    <!-- Service worker registration -->
    <script>
        // Robust SW registration: skip localhost and check for 404
        async function maybeRegisterSW() {
            // Check if service worker is supported
            if (!('serviceWorker' in navigator)) {
                console.log('[SW] Service Worker not supported in this browser');
                return;
            }

            // Skip registration on localhost
            if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                console.log('[SW] Skipping registration on localhost');
                return;
            }

            // Only register on /device pages
            if (!location.pathname.startsWith('/device')) {
                return;
            }

            try {
                // Check if sw.js exists before attempting registration
                const response = await fetch('/device/sw.js', { method: 'HEAD' });
                if (response.status !== 200) {
                    console.log(`[SW] Service worker script not found (${response.status})`);
                    return;
                }

                // All checks passed - register the service worker
                const registration = await navigator.serviceWorker.register('/device/sw.js', { scope: '/device/' });
                console.log('[SW] Registered successfully', registration.scope);
            } catch (err) {
                console.warn('[SW] Registration failed:', err.message);
            }
        }

        // Register on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', maybeRegisterSW);
        } else {
            maybeRegisterSW();
        }

        // Optional: show a custom "Install" button if you add one with [data-install]
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.querySelector('[data-install]');
            if (btn) btn.style.display = 'inline-flex';
        });
        document.querySelector('[data-install]')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        });
    </script>

</body>

</html>
